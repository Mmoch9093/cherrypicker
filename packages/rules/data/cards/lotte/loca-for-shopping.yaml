card:
  id: lotte-loca-for-shopping
  issuer: lotte
  name: LOCA for Shopping
  nameKo: 롯데카드 LOCA for Shopping
  type: credit
  annualFee:
    domestic: 20000
    international: 20000
  url: https://www.lottecard.co.kr/app/LPCDXAD_V100.lc
  lastUpdated: "2026-03-25"
  source: manual

performanceTiers:
  - id: tier0
    label: 무실적
    minSpending: 0
    maxSpending: 1499999

  - id: tier1
    label: 전월 150만원 이상
    minSpending: 1500000
    maxSpending: null

performanceExclusions:
  - tax_payment
  - gift_card
  - apartment_mgmt
  - tuition

rewards:
