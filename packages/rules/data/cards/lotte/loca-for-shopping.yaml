    type: discount
    tiers:
      - performanceTier: tier0
        rate: 0
        monthlyCap: null
        perTransactionCap: null
      - performanceTier: tier1
        rate: 10.0
        monthlyCap: 10000
        perTransactionCap: null
    conditions:
      excludeOnline: true
      note: "오프라인 대형마트 결제 건만 적용 (롯데슈퍼, 이마트에브리데이, 홈플러스익스프레스 제외)"
      specificMerchants:
        - 롯데마트
        - 이마트
        - 홈플러스
        - 코스트코

  - category: online_shopping
    type: discount
    tiers:
      - performanceTier: tier0
        rate: 0
        monthlyCap: null
        perTransactionCap: null
      - performanceTier: tier1
        rate: 10.0
        monthlyCap: 10000
        perTransactionCap: null
    conditions:
      note: "온라인쇼핑·홈쇼핑 (일부 PG 결제 제외)"

  - category: offline_shopping
    type: discount
    tiers:
      - performanceTier: tier0
        rate: 0
        monthlyCap: null
        perTransactionCap: null
      - performanceTier: tier1
        rate: 10.0
        monthlyCap: 10000
        perTransactionCap: null
    conditions:
      note: "오프라인 쇼핑 (백화점, 아울렛)"

  - category: convenience_store
    type: discount
    tiers:
      - performanceTier: tier0
        rate: 0
        monthlyCap: null
        perTransactionCap: null
      - performanceTier: tier1
        rate: 10.0
        monthlyCap: 5000
